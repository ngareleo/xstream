name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  server:
    name: Server — lint, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type-check
        run: bun run lint

      - name: Validate GraphQL SDL
        run: bun run check:schema

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

  client:
    name: Client — lint, test, relay, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: Generate Relay artifacts
        run: bun run relay

      - name: Type-check
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Test stories
        run: bun run test-storybook

      - name: Build Storybook
        run: bun run build-storybook

      - name: Build
        run: bun run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist/

  deploy-pages:
    name: Deploy bundle report to Pages
    needs: client
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
