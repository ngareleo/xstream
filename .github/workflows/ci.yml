name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  server-rust:
    name: Rust server — fmt, clippy, build, test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          # Workspace root is the repo root; target dir is at <root>/target.
          workspaces: . -> target

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root bun deps
        # Needed so the `scripts/` workspace can type-check.
        run: bun install

      - name: Lint scripts/ TS files
        # `scripts/` is its own Bun workspace with `tsc --noEmit` as its lint.
        # Type-checks setup-ffmpeg.ts and any other shared TS helpers.
        run: bun run --filter scripts lint

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        # `--all-targets` covers the test binary in tests/ as well as src/.
        # `-D warnings` makes any new lint a CI failure — keeps drift out.
        # `--exclude xstream-tauri` skips the Tauri shell crate — it depends
        # on `webkit2gtk-4.1-dev` etc. which this job does not apt-install
        # (the dedicated `tauri-build` job below does). Linting xstream-tauri
        # belongs there, not here.
        run: cargo clippy --workspace --exclude xstream-tauri --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --exclude xstream-tauri --all-targets

      - name: Test
        run: cargo test --workspace --exclude xstream-tauri

      - name: GraphQL schema drift check
        # The client's relay-compiler reads `server-rust/schema.graphql`,
        # which is the checked-in SDL emitted by the `print_schema` binary.
        # If a server-side type changed without `bun run schema:emit`, the
        # checked-in file would be stale and the client would generate
        # outdated relay artefacts. Catch that here while we already have
        # the Rust toolchain warm.
        shell: bash
        run: |
          set -euo pipefail
          cargo run --quiet --bin print_schema -p xstream-server > /tmp/fresh-schema.graphql
          if ! diff -u server-rust/schema.graphql /tmp/fresh-schema.graphql; then
            echo "::error::server-rust/schema.graphql is stale — run 'bun run schema:emit' and commit the diff."
            exit 1
          fi

  tauri-build:
    name: Tauri — Linux build (unsigned)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          # Workspace root is the repo root; target dir is at <root>/target.
          # Reuses the same cache as the server-rust job — Tauri's `setup` and
          # `runtime` crates compile separately, but xstream-server's deps are
          # shared.
          workspaces: . -> target
          # Tauri builds are slow; force cache writes even on failure so a
          # subsequent run picks up the partially-built tree.
          cache-on-failure: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Tauri Linux build deps
        # webkit2gtk-4.1 is what tauri 2 / wry expects. appindicator + rsvg
        # cover system-tray + icon rendering. ffmpeg is staged separately via
        # setup-ffmpeg below.
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install bun deps (root + workspaces)
        run: bun install

      - name: Generate Relay artifacts
        # The Tauri bundler runs `bun run --filter client build`, which expects
        # `client/src/relay/__generated__/` to exist. The client job above also
        # does this; we re-run here so the tauri-build job is independently
        # runnable.
        run: bun run --filter client relay

      - name: Cache tauri-cli binary
        # tauri-cli is ~3min to compile and the binary itself is the same
        # across runs. Cache by `^2` major version pin from package.json
        # `tauri:dev`/`tauri:build` scripts.
        id: tauri-cli-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tauri
          key: ${{ runner.os }}-cargo-tauri-cli-v2

      - name: Install tauri-cli
        if: steps.tauri-cli-cache.outputs.cache-hit != 'true'
        run: cargo install tauri-cli --version '^2' --locked

      - name: Stage bundled ffmpeg for tauri build
        # `setup-ffmpeg --target=tauri-bundle` is also the `beforeBuildCommand`
        # in `tauri.conf.json`, but invoking it explicitly here lets the cache
        # step capture the staged binaries into a workflow cache, dropping
        # ~50 MB of repeated downloads from subsequent runs.
        run: bun run setup-ffmpeg --target=tauri-bundle

      - name: Build Tauri bundle (deb + AppImage)
        env:
          # Skip the VAAPI probe — CI runners have no /dev/dri. This is the
          # same env shape the SDL-parity job uses.
          HW_ACCEL: "off"
        run: cd src-tauri && cargo tauri build --bundles deb,appimage

      - name: Upload Tauri artifacts
        # Reviewers can download the .AppImage / .deb from a green CI run to
        # smoke-test PR #43 without building locally. Retention 7 days is
        # enough for a review cycle and saves Actions storage.
        #
        # Bundle output lives at the workspace-root `target/` because
        # `src-tauri` is a workspace member, not a standalone crate —
        # cargo writes to the shared workspace target dir regardless of
        # where the build was invoked from.
        uses: actions/upload-artifact@v4
        with:
          name: xstream-tauri-linux-x86_64
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage
          retention-days: 7
          if-no-files-found: error

  client:
    name: Client — lint, test, relay, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: Generate Relay artifacts
        run: bun run relay

      - name: Type-check
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Test stories
        run: bun run test-storybook

      - name: Build Storybook
        run: bun run build-storybook

      - name: Build
        run: bun run build

      - name: Prepare Pages artifact
        run: mkdir -p /tmp/pages && cp client/dist/stats.html /tmp/pages/index.html
        working-directory: ${{ github.workspace }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/pages/

  deploy-pages:
    name: Deploy bundle report to Pages
    needs: client
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
