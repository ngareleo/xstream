name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  server:
    name: Server — lint, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type-check
        run: bun run lint

      - name: Validate GraphQL SDL
        run: bun run check:schema

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

  server-rust:
    name: Rust server — fmt, clippy, build, test, SDL parity
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          # Workspace root is the repo root; target dir is at <root>/target.
          workspaces: . -> target

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root bun deps (graphql for the SDL-parity script)
        run: bun install

      - name: Lint scripts/ TS files
        # `scripts/` is its own Bun workspace with `tsc --noEmit` as its lint.
        # Type-checks check-sdl-parity.ts, setup-ffmpeg.ts, test-chunking.ts.
        run: bun run --filter scripts lint

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        # `--all-targets` covers the test binary in tests/ as well as src/.
        # `-D warnings` makes any new lint a CI failure — keeps drift out.
        # `--exclude xstream-tauri` skips the Tauri shell crate — it depends
        # on `webkit2gtk-4.1-dev` etc. which this job does not apt-install
        # (the dedicated `tauri-build` job below does). Linting xstream-tauri
        # belongs there, not here.
        run: cargo clippy --workspace --exclude xstream-tauri --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --exclude xstream-tauri --all-targets

      - name: Test
        run: cargo test --workspace --exclude xstream-tauri

      - name: Install ffmpeg (apt, for SDL parity boot)
        # The SDL parity step boots the Rust server, which probes for ffmpeg
        # at startup before serving /healthz. We don't need jellyfin-ffmpeg
        # here (the encode path isn't exercised); ubuntu's stock ffmpeg
        # satisfies the boot dependency and the env-var override below
        # skips the manifest version check.
        run: sudo apt-get update -y && sudo apt-get install -y ffmpeg

      - name: SDL parity (Rust introspection ↔ Bun typeDefs)
        # Boots the Rust server, runs `scripts/check-sdl-parity.ts` against
        # its introspection, and kills it. The script is the Step-1 acceptance
        # gate — drift here means the Relay client's generated artifacts will
        # break across the cutover.
        #
        # Env shape:
        #   FFMPEG_PATH / FFPROBE_PATH — env-var override at
        #     `services/ffmpeg_path.rs:resolve_ffmpeg_paths` skips the manifest
        #     version check (CI doesn't install jellyfin-ffmpeg; ubuntu's
        #     stock ffmpeg at /usr/bin satisfies the boot dependency without
        #     a 50 MB .deb download per run).
        #   HW_ACCEL=off — skips the VAAPI probe (no /dev/dri on CI runners).
        #     The SDL parity check only exercises GraphQL introspection, so
        #     the encode path isn't touched.
        env:
          FFMPEG_PATH: /usr/bin/ffmpeg
          FFPROBE_PATH: /usr/bin/ffprobe
          HW_ACCEL: "off"
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tmp
          # Build the binary first, then exec — separates compile time from
          # server-up time. With `cargo run`, a cold workspace cache (e.g. on
          # the first run after Cargo.lock changes) eats into the healthcheck
          # window and the for-loop times out before the server has even
          # finished compiling.
          cargo build --bin xstream-server
          DB_PATH="$PWD/tmp/ci-xstream.db" target/debug/xstream-server &
          SERVER_PID=$!
          trap "kill $SERVER_PID 2>/dev/null || true; wait $SERVER_PID 2>/dev/null || true" EXIT

          for _ in $(seq 1 60); do
            if curl -fs http://127.0.0.1:3002/healthz >/dev/null 2>&1; then
              echo "Rust server is up"
              break
            fi
            sleep 0.5
          done
          # Hard-fail if the server never came up.
          curl -fs http://127.0.0.1:3002/healthz >/dev/null

          RUST_GRAPHQL_URL=http://127.0.0.1:3002/graphql bun run scripts/check-sdl-parity.ts

  tauri-build:
    name: Tauri — Linux build (unsigned)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          # Workspace root is the repo root; target dir is at <root>/target.
          # Reuses the same cache as the server-rust job — Tauri's `setup` and
          # `runtime` crates compile separately, but xstream-server's deps are
          # shared.
          workspaces: . -> target
          # Tauri builds are slow; force cache writes even on failure so a
          # subsequent run picks up the partially-built tree.
          cache-on-failure: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Tauri Linux build deps
        # Mirrors install.sh §0b. webkit2gtk-4.1 is what tauri 2 / wry expects.
        # appindicator + rsvg cover system-tray + icon rendering. ffmpeg is
        # already pulled in via setup-ffmpeg below.
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install bun deps (root + workspaces)
        run: bun install

      - name: Generate Relay artifacts
        # The Tauri bundler runs `bun run --filter client build`, which expects
        # `client/src/relay/__generated__/` to exist. The client job above also
        # does this; we re-run here so the tauri-build job is independently
        # runnable.
        run: bun run --filter client relay

      - name: Cache tauri-cli binary
        # tauri-cli is ~3min to compile and the binary itself is the same
        # across runs. Cache by `^2` major version pin from package.json
        # `tauri:dev`/`tauri:build` scripts.
        id: tauri-cli-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tauri
          key: ${{ runner.os }}-cargo-tauri-cli-v2

      - name: Install tauri-cli
        if: steps.tauri-cli-cache.outputs.cache-hit != 'true'
        run: cargo install tauri-cli --version '^2' --locked

      - name: Stage bundled ffmpeg for tauri build
        # `setup-ffmpeg --target=tauri-bundle` is also the `beforeBuildCommand`
        # in `tauri.conf.json`, but invoking it explicitly here lets the cache
        # step capture the staged binaries into a workflow cache, dropping
        # ~50 MB of repeated downloads from subsequent runs.
        run: bun run setup-ffmpeg --target=tauri-bundle

      - name: Build Tauri bundle (deb + AppImage)
        env:
          # Skip the VAAPI probe — CI runners have no /dev/dri. This is the
          # same env shape the SDL-parity job uses.
          HW_ACCEL: "off"
        run: cd src-tauri && cargo tauri build --bundles deb,appimage

      - name: Upload Tauri artifacts
        # Reviewers can download the .AppImage / .deb from a green CI run to
        # smoke-test PR #43 without building locally. Retention 7 days is
        # enough for a review cycle and saves Actions storage.
        #
        # Bundle output lives at the workspace-root `target/` because
        # `src-tauri` is a workspace member, not a standalone crate —
        # cargo writes to the shared workspace target dir regardless of
        # where the build was invoked from.
        uses: actions/upload-artifact@v4
        with:
          name: xstream-tauri-linux-x86_64
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage
          retention-days: 7
          if-no-files-found: error

  client:
    name: Client — lint, test, relay, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: Generate Relay artifacts
        run: bun run relay

      - name: Type-check
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Test stories
        run: bun run test-storybook

      - name: Build Storybook
        run: bun run build-storybook

      - name: Build
        run: bun run build

      - name: Prepare Pages artifact
        run: mkdir -p /tmp/pages && cp client/dist/stats.html /tmp/pages/index.html
        working-directory: ${{ github.workspace }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/pages/

  deploy-pages:
    name: Deploy bundle report to Pages
    needs: client
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
