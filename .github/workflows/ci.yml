name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  server:
    name: Server — lint, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type-check
        run: bun run lint

      - name: Validate GraphQL SDL
        run: bun run check:schema

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

  client:
    name: Client — lint, test, relay, build
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: Generate Relay artifacts
        run: bun run relay

      - name: Type-check
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Test stories
        run: bun run test-storybook

      - name: Build Storybook
        run: bun run build-storybook

      - name: Build
        run: bun run build

      # Stage stats.html as index.html so GitHub Pages serves it at the root URL.
      - name: Prepare Pages artifact
        run: |
          mkdir -p /tmp/pages-out
          cp dist/stats.html /tmp/pages-out/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/pages-out

  deploy-pages:
    name: Deploy bundle report to Pages
    needs: client
    runs-on: ubuntu-latest
    # Newer pushes cancel in-flight deployments so Pages always reflects
    # the latest PR build.
    concurrency:
      group: pages
      cancel-in-progress: true
    permissions:
      pages: write
      id-token: write
      pull-requests: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Comment Pages link on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## Bundle Report',
                '',
                `[View interactive bundle report](${{ steps.deploy.outputs.page_url }})`,
              ].join('\n'),
            });
