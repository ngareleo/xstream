name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  server:
    name: Server — lint, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type-check
        run: bun run lint

      - name: Validate GraphQL SDL
        run: bun run check:schema

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

  client:
    name: Client — lint, test, relay, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: Generate Relay artifacts
        run: bun run relay

      - name: Type-check
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Test stories
        run: bun run test-storybook

      - name: Build Storybook
        run: bun run build-storybook

      - name: Build
        run: bun run build

      - name: Upload bundle report as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy-bundle-report:
    name: Deploy bundle report
    needs: client
    # Deploy only on push events — PR merge refs (refs/pull/*/merge) are not
    # real branches and are always rejected by the Pages environment policy.
    # The push event carries refs/heads/<branch> which matches the "*" allowlist.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      pull-requests: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Comment bundle report link on open PR
        uses: actions/github-script@v7
        with:
          script: |
            const pageUrl = '${{ steps.deployment.outputs.page_url }}';
            const branch = context.ref.replace('refs/heads/', '');
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open',
            });
            for (const pr of prs) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: [
                  '## Bundle Report',
                  '',
                  `[View interactive bundle report](${pageUrl}stats.html)`,
                ].join('\n'),
              });
            }
