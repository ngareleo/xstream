name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  server:
    name: Server — lint, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type-check
        run: bun run lint

      - name: Validate GraphQL SDL
        run: bun run check:schema

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

  server-rust:
    name: Rust server — fmt, clippy, build, test, SDL parity
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          # Workspace root is the repo root; target dir is at <root>/target.
          workspaces: . -> target

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root bun deps (graphql for the SDL-parity script)
        run: bun install

      - name: Lint scripts/ TS files
        # `scripts/` is its own Bun workspace with `tsc --noEmit` as its lint.
        # Type-checks check-sdl-parity.ts, setup-ffmpeg.ts, test-chunking.ts.
        run: bun run --filter scripts lint

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        # `--all-targets` covers the test binary in tests/ as well as src/.
        # `-D warnings` makes any new lint a CI failure — keeps drift out.
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test
        run: cargo test --workspace

      - name: Install ffmpeg (apt, for SDL parity boot)
        # The SDL parity step boots the Rust server, which probes for ffmpeg
        # at startup before serving /healthz. We don't need jellyfin-ffmpeg
        # here (the encode path isn't exercised); ubuntu's stock ffmpeg
        # satisfies the boot dependency and the env-var override below
        # skips the manifest version check.
        run: sudo apt-get update -y && sudo apt-get install -y ffmpeg

      - name: SDL parity (Rust introspection ↔ Bun typeDefs)
        # Boots the Rust server, runs `scripts/check-sdl-parity.ts` against
        # its introspection, and kills it. The script is the Step-1 acceptance
        # gate — drift here means the Relay client's generated artifacts will
        # break across the cutover.
        #
        # Env shape:
        #   FFMPEG_PATH / FFPROBE_PATH — env-var override at
        #     `services/ffmpeg_path.rs:resolve_ffmpeg_paths` skips the manifest
        #     version check (CI doesn't install jellyfin-ffmpeg; ubuntu's
        #     stock ffmpeg at /usr/bin satisfies the boot dependency without
        #     a 50 MB .deb download per run).
        #   HW_ACCEL=off — skips the VAAPI probe (no /dev/dri on CI runners).
        #     The SDL parity check only exercises GraphQL introspection, so
        #     the encode path isn't touched.
        env:
          FFMPEG_PATH: /usr/bin/ffmpeg
          FFPROBE_PATH: /usr/bin/ffprobe
          HW_ACCEL: "off"
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tmp
          DB_PATH="$PWD/tmp/ci-xstream.db" cargo run --quiet --bin xstream-server &
          SERVER_PID=$!
          trap "kill $SERVER_PID 2>/dev/null || true; wait $SERVER_PID 2>/dev/null || true" EXIT

          for _ in $(seq 1 60); do
            if curl -fs http://127.0.0.1:3002/healthz >/dev/null 2>&1; then
              echo "Rust server is up"
              break
            fi
            sleep 0.5
          done
          # Hard-fail if the server never came up.
          curl -fs http://127.0.0.1:3002/healthz >/dev/null

          RUST_GRAPHQL_URL=http://127.0.0.1:3002/graphql bun run scripts/check-sdl-parity.ts

  client:
    name: Client — lint, test, relay, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: Generate Relay artifacts
        run: bun run relay

      - name: Type-check
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Test stories
        run: bun run test-storybook

      - name: Build Storybook
        run: bun run build-storybook

      - name: Build
        run: bun run build

      - name: Prepare Pages artifact
        run: mkdir -p /tmp/pages && cp client/dist/stats.html /tmp/pages/index.html
        working-directory: ${{ github.workspace }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/pages/

  deploy-pages:
    name: Deploy bundle report to Pages
    needs: client
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
