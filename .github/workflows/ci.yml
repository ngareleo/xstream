name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  server:
    name: Server — lint, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type-check
        run: bun run lint

      - name: Validate GraphQL SDL
        run: bun run check:schema

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

  client:
    name: Client — lint, test, relay, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: Type-check
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Test stories
        run: bun run test-storybook

      - name: Generate Relay artifacts
        run: bun run relay

      - name: Check Relay artifacts are up to date
        run: git diff --exit-code src/relay/__generated__

      - name: Build Storybook
        run: bun run build-storybook

      - name: Build
        run: bun run build
