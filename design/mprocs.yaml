# Dev orchestrator for the design lab. Two equivalent ways to run:
#
#   bun run design          # from repo root (preferred — script handles the cd)
#   cd design && mprocs     # from this directory
#
# IMPORTANT: mprocs resolves the `cwd:` paths below relative to its OWN
# working directory, NOT the config file's directory. Always invoke from
# inside `design/` (the `bun run design` script does this for you).
#
#   Release (Xstream — green + Anton)            http://localhost:5001
#
# This file is sibling to the root mprocs.yaml so the two are independent —
# the design lab is not part of the production dev orchestration.

procs:
  release:
    cwd: ./Release
    cmd: [bun, run, dev]
