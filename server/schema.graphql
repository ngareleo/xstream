interface Node {
  id: ID!
}

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

enum MediaType {
  MOVIES
  TV_SHOWS
}

type LibraryStats {
  totalCount: Int!
  matchedCount: Int!
  unmatchedCount: Int!
  totalSizeBytes: Float!
}

type Library implements Node {
  id: ID!
  name: String!
  path: String!
  mediaType: MediaType!
  videoExtensions: [String!]!
  stats: LibraryStats!
  videos(first: Int, after: String, search: String, mediaType: MediaType): VideoConnection!
}

type VideoMetadata {
  imdbId: String!
  title: String!
  year: Int
  genre: String
  director: String
  cast: [String!]!
  rating: Float
  plot: String
  posterUrl: String
}

type Video implements Node {
  id: ID!
  title: String!
  filename: String!
  durationSeconds: Float!
  fileSizeBytes: Float!
  bitrate: Int!
  matched: Boolean!
  mediaType: MediaType!
  library: Library!
  metadata: VideoMetadata
  videoStream: VideoStreamInfo
  audioStream: AudioStreamInfo
}

type VideoStreamInfo {
  codec: String!
  width: Int!
  height: Int!
  fps: Float!
}

type AudioStreamInfo {
  codec: String!
  channels: Int!
  sampleRate: Int!
}

type VideoConnection {
  edges: [VideoEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type VideoEdge {
  node: Video!
  cursor: String!
}

type WatchlistItem implements Node {
  id: ID!
  video: Video!
  addedAt: String!
  progressSeconds: Float!
  notes: String
}

type OmdbSearchResult {
  imdbId: String!
  title: String!
  year: Int
  posterUrl: String
  plot: String
}

enum Resolution {
  RESOLUTION_240P
  RESOLUTION_360P
  RESOLUTION_480P
  RESOLUTION_720P
  RESOLUTION_1080P
  RESOLUTION_4K
}

enum JobStatus {
  PENDING
  RUNNING
  COMPLETE
  ERROR
}

type TranscodeJob implements Node {
  id: ID!
  video: Video!
  resolution: Resolution!
  status: JobStatus!
  totalSegments: Int
  completedSegments: Int!
  startTimeSeconds: Float
  endTimeSeconds: Float
  createdAt: String!
  error: String
}

type PlaybackSession {
  id: ID!
  traceId: String!
  videoTitle: String!
  resolution: Resolution!
  startedAt: String!
}

type DirEntry {
  name: String!
  path: String!
}

type SettingEntry {
  key: String!
  value: String
}

type Query {
  node(id: ID!): Node
  libraries: [Library!]!
  videos(first: Int, libraryId: ID, search: String, mediaType: MediaType): VideoConnection!
  video(id: ID!): Video
  transcodeJob(id: ID!): TranscodeJob
  watchlist: [WatchlistItem!]!
  searchOmdb(query: String!, year: Int): [OmdbSearchResult!]!
  listDirectory(path: String!): [DirEntry!]!
  playbackHistory: [PlaybackSession!]!
  settings(keys: [String!]!): [SettingEntry!]!
}

type Mutation {
  scanLibraries: [Library!]!
  startTranscode(
    videoId: ID!
    resolution: Resolution!
    startTimeSeconds: Float
    endTimeSeconds: Float
  ): TranscodeJob!
  createLibrary(
    name: String!
    path: String!
    mediaType: MediaType!
    extensions: [String!]!
  ): Library!
  deleteLibrary(id: ID!): Boolean!
  updateLibrary(
    id: ID!
    name: String
    path: String
    mediaType: MediaType
    extensions: [String!]
  ): Library!
  matchVideo(videoId: ID!, imdbId: String!): Video!
  unmatchVideo(videoId: ID!): Video!
  addToWatchlist(videoId: ID!): WatchlistItem!
  removeFromWatchlist(id: ID!): Boolean!
  updateWatchProgress(videoId: ID!, progressSeconds: Float!): WatchlistItem!
  setSetting(key: String!, value: String!): Boolean!
  recordPlaybackSession(
    traceId: String!
    videoId: ID!
    resolution: Resolution!
  ): PlaybackSession!
}

type LibraryScanUpdate {
  scanning: Boolean!
}

type LibraryScanProgress {
  scanning: Boolean!
  libraryId: ID
  done: Int
  total: Int
}

type Subscription {
  transcodeJobUpdated(jobId: ID!): TranscodeJob!
  libraryScanUpdated: LibraryScanUpdate!
  libraryScanProgress: LibraryScanProgress!
}
